name: "Aiki Core"
description: "Core flow that handles initialization and provenance tracking with user edit detection"
version: "1"

# SessionStart: Initialize and verify repository setup when a session begins
SessionStart:
  # Ensure we're on a fresh change before starting session
  # This preserves any existing uncommitted work and prevents attributing
  # pre-existing changes to the new editor session
  - jj: new

  # Initialize Aiki (idempotent - safe to run multiple times)
  - shell: aiki init --quiet
    on_failure: stop

# PreFileChange: Stash any user changes before AI starts editing
PreFileChange:
  # Check if working copy has any changes
  - jj: diff -r @ --name-only
    alias: changed_files

  # If there are changes (non-empty string), stash them before AI starts
  - if: $changed_files
    then:
      - jj: describe --message "User changes (pre-AI edit)" --reset-author
      - jj: new # Give AI a clean working copy

# PostFileChange: Record provenance metadata after every AI edit
# With user edit detection: separates AI changes from user modifications
PostFileChange:
  # Classify edits to detect user modifications
  # This compares AI's intended edits with actual file state
  # Result: classification_type, extra_files, details
  - let: detection = self.classify_edits

  - if: $detection.classification_type == "AdditiveUserEdits"
    then:
      # User added more changes - separate them into two changes
      - let: prep = self.prepare_separation

      - self: write_ai_files
      - jj: split --message "$prep.ai_message" $prep.file_list
      - jj: metaedit -r @- --author "$prep.ai_author" --no-edit

      - self: restore_original_files
      # Leave user change (@) without aiki metadata - it's a human change
      - jj: metaedit --message "User changes (during AI edit)" --reset-author
    else:
      # For ExactMatch or OverlappingUserEdits, set AI metadata
      - let: metadata = self.build_metadata
        on_failure: stop
      - jj: metaedit --message "$metadata.message" --author "$metadata.author"

  # Create a new change for the next edit
  - jj: new

# PrepareCommitMessage: Modify commit message via Git's prepare-commit-msg hook
PrepareCommitMessage:
  # Generate co-author lines from staged changes
  - let: coauthors = self.generate_coauthors
    on_failure: stop

  # Append co-authors as Git trailers
  - commit_message:
      append_trailer: $coauthors
    on_failure: stop
