name: Log Before Flow
version: "1"

# This flow runs before the main default.yml actions
# Demonstrates flow composition with before/after

change.completed:
  - log: "[BEFORE] Log-before flow executing before default.yml"

session.started:
  - log: "[BEFORE] Session starting - log-before flow"

turn.started:
  - log: "[BEFORE] Turn started - log-before flow"
