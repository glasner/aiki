name: "Aiki Core"
description: "Core flow that handles initialization and provenance tracking"
version: "1"

# Start: Initialize and verify repository setup when a session begins
Start:
  # Initialize Aiki (idempotent - safe to run multiple times)
  - shell: aiki init --quiet
    on_failure: stop

# PostChange: Record provenance metadata after every AI edit
PostChange:
  # Build the provenance description using self reference
  - let: description = self.build_description
    on_failure: stop

  # Set the change description with provenance metadata
  - jj: describe -m "$description"

  # Create a new change for the next edit
  - jj: new

# PreCommit: Generate co-author metadata before Git commits
PreCommit:
  # Generate co-author lines from staged changes
  - let: coauthors = self.generate_coauthors
    on_failure: stop

  # Output co-authors to stdout (captured by Git hook)
  - shell: echo "$coauthors"
