name: Sync cli/ to public repo (PR)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync cli/ to public repo via PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split and push cli/ branch
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail

          : "${PUBLIC_REPO_PAT:?missing PUBLIC_REPO_PAT}"

          BRANCH="sync/cli-${GITHUB_SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git subtree split --prefix=cli -b "$BRANCH"
          git push "https://x-access-token:${PUBLIC_REPO_PAT}@github.com/glasner/aiki.git" "$BRANCH:$BRANCH" --force

      - name: Open sync PR
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail

          BRANCH="sync/cli-${GITHUB_SHA}"
          TITLE="chore(aiki): sync cli subtree from aiki-private @${GITHUB_SHA:0:7}"
          BODY=$'Automatically synced `cli/` subtree from `glasner/aiki-private`.\n\n'
          BODY+="Trigger commit: https://github.com/glasner/aiki-private/commit/${GITHUB_SHA}\n"

          if [ -z "${PUBLIC_REPO_PAT}" ]; then
            echo "PUBLIC_REPO_PAT missing" >&2
            exit 1
          fi

          # Use PAT for cross-repo PR actions.
          echo "${PUBLIC_REPO_PAT}" | gh auth login --hostname github.com --with-token > /dev/null

          EXISTING=$(gh pr list --repo glasner/aiki --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "${EXISTING}" ] && [ "${EXISTING}" != "null" ]; then
            gh pr comment --repo glasner/aiki "$EXISTING" --body "$BODY"
            exit 0
          fi

          gh pr create --repo glasner/aiki --base main --head "$BRANCH" --title "$TITLE" --body "$BODY"
          
