name: Sync cli/ to public repo

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync cli/ to public repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split and push cli/
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Trim accidental whitespace/newlines from secret values.
          PUBLIC_REPO_PAT=$(printf '%s' "$PUBLIC_REPO_PAT" | tr -d '\r\n\t ')

          if [ -z "${PUBLIC_REPO_PAT:-}" ]; then
            echo "PUBLIC_REPO_PAT is empty"
            exit 1
          fi

          # Quick probe for token validity.
          PAT_USER=$(curl -sSf -H "Authorization: Bearer ${PUBLIC_REPO_PAT}" https://api.github.com/user | python3 -c 'import sys, json; print(json.load(sys.stdin).get("login", "<unknown>"))')
          echo "PAT identity: ${PAT_USER}"

          BRANCH="cli-sync-${GITHUB_SHA}"
          git subtree split --prefix=cli -b "$BRANCH"

          # Use explicit netrc auth for robustness with fine-grained PATs.
          cat > ~/.netrc <<EOF_NETRC
machine github.com
login x-access-token
password $PUBLIC_REPO_PAT
EOF_NETRC
          chmod 600 ~/.netrc

          git push https://github.com/glasner/aiki.git "$BRANCH:main" --force
          git branch -D "$BRANCH"
